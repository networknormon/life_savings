<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Colecciones & Finanzas</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script>
        const hash = window.location.hash;
        let idToken = localStorage.getItem('cognito_id_token');

        if (hash.includes("id_token=")) {
            const urlParams = new URLSearchParams(hash.replace('#', '?'));
            idToken = urlParams.get('id_token');
            localStorage.setItem('cognito_id_token', idToken);
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        if (!idToken) {
            window.location.href = 'login.html';
        }
        
        function logout() {
            localStorage.removeItem('cognito_id_token');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">🗃️ MyTracker</div>
            <nav>
                <select id="month-selector" onchange="changeMonth()">
                    <option value="Enero">Enero</option>
                    <option value="Febrero">Febrero</option>
                    <option value="Marzo">Marzo</option>
                    <option value="Abril">Abril</option>
                    <option value="Mayo">Mayo</option>
                    <option value="Junio">Junio</option>
                    <option value="Julio">Julio</option>
                    <option value="Agosto">Agosto</option>
                    <option value="Septiembre">Septiembre</option>
                    <option value="Octubre">Octubre</option>
                    <option value="Noviembre">Noviembre</option>
                    <option value="Diciembre">Diciembre</option>
                </select>
                <button onclick="logout()" class="btn btn-outline">Salir</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="dashboard">
            <div class="card-stats">
                <div class="stat-item">
                    <label>Sueldo</label>
                    <div class="val" id="val-salary">€0</div>
                </div>
                <div class="stat-item">
                    <label>Ahorro</label>
                    <div class="val text-green" id="val-savings">€0</div>
                </div>
                <div class="stat-item">
                    <label>Gastos Fijos</label>
                    <div class="val text-red" id="val-fixed">€0</div>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="budgetChart"></canvas>
                <div class="hobby-info">
                    <div class="hobby-title">Ocio Restante</div>
                    <div class="hobby-value" id="val-hobby">€0.00</div>
                    <div class="slider-footer">
                        Disponible: <span id="hobby-budget">€0.00</span>
                    </div>
                </div>
            </div>

            <div class="strategy-box">
                <div class="strategy-icon">🐷</div>
                <div class="strategy-text">
                    <h3>Plan de Ataque</h3>
                    <p>
                        Para el Master Set de Magic (<span id="magic-cost">€0</span>), guarda 
                        <strong class="text-green" id="savings-suggestion">€0</strong> en la hucha.
                        Usa los <strong class="text-blue" id="spending-money">€0</strong> restantes para mangas sueltos.
                    </p>
                    <div class="strategy-time">Tiempo estimado: <span id="months-to-finish">--</span> Meses</div>
                </div>
            </div>
        </section>

        <div id="collections-container" class="collections-grid"></div>

        <section class="binder-section">
            <div class="binder-header">
                <h2>🗂️ Virtual Binder (Master Set)</h2>
                <div id="wishlist-badge" class="badge">Wishlist: 0 cartas</div>
            </div>
            <div id="virtual-binder" class="binder-grid">
                </div>
        </section>

    </main>

    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1408.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
